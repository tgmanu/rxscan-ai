services:
  - type: web
    name: rxscan-ai-backend
    env: python
    buildCommand: "pip install -r requirements.txt && apt-get install -y tesseract-ocr"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract